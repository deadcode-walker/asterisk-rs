[default]

; --- basic call scenarios ---

; 100: auto-answer, short wait, hangup
exten => 100,1,Answer()
same => n,Wait(1)
same => n,Hangup()

; 101: return busy signal
exten => 101,1,Busy(5)
same => n,Hangup()

; 102: return congestion signal
exten => 102,1,Congestion(5)
same => n,Hangup()

; 103: ring with no answer (30s ring then timeout)
exten => 103,1,Ringing()
same => n,Wait(30)
same => n,Hangup()

; --- media and DTMF ---

; 104: answer, send DTMF digits, hangup
exten => 104,1,Answer()
same => n,Wait(1)
same => n,SendDTMF(1234)
same => n,Wait(2)
same => n,Hangup()

; 105: answer, playback silence, hangup
exten => 105,1,Answer()
same => n,Playback(silence/1)
same => n,Hangup()

; --- variable manipulation ---

; 106: answer, set channel variables, wait, hangup
exten => 106,1,Answer()
same => n,Set(TESTVAR=hello_world)
same => n,Set(ANOTHER_VAR=42)
same => n,Wait(2)
same => n,Hangup()

; --- AGI ---

; 200: answer then connect to FastAGI server
exten => 200,1,Answer()
same => n,AGI(agi://host.docker.internal:4573)
same => n,Hangup()

; --- ARI / Stasis ---

; 300: answer then enter Stasis application
exten => 300,1,Answer()
same => n,Stasis(test-app)
same => n,Hangup()

; 301: enter Stasis without pre-answering (for ARI answer test)
exten => 301,1,Stasis(test-app)
same => n,Hangup()

; --- long-running ---

; 999: auto-answer, wait 5s, hangup (for originate tests)
exten => 999,1,Answer()
same => n,Wait(5)
same => n,Hangup()

; --- bridge test helper ---

; 998: answer, wait 30s (stays up for bridge tests to add to bridge)
exten => 998,1,Answer()
same => n,Wait(30)
same => n,Hangup()


; --- echo / interactive ---

; 107: answer, echo audio back (stays up until remote hangup)
exten => 107,1,Answer()
same => n,Echo()
same => n,Hangup()

; 108: answer, set variables, read back via AGI, hangup
exten => 108,1,Answer()
same => n,Set(PRESET_VAR=from_dialplan)
same => n,AGI(agi://host.docker.internal:4573/vartest)
same => n,Hangup()

; --- Stasis with arguments ---

; 302: enter Stasis with application arguments
exten => 302,1,Stasis(test-app,hello,world)
same => n,Hangup()

; --- continue target ---

; 400: answer, wait 2s, hangup (target for ARI channel.continue)
exten => 400,1,Answer()
same => n,Wait(2)
same => n,Hangup()