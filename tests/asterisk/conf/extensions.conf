[default]
; echo test — answers, plays silence, hangs up
exten => 100,1,Answer()
same => n,Wait(1)
same => n,Hangup()

; FastAGI test — connects to our AGI server
exten => 200,1,Answer()
same => n,AGI(agi://host.docker.internal:4573)
same => n,Hangup()

; Stasis test — enters ARI stasis app
exten => 300,1,Answer()
same => n,Stasis(test-app)
same => n,Hangup()

; local channel for originate tests
exten => 999,1,Answer()
same => n,Wait(5)
same => n,Hangup()
