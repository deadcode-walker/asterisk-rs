name: Semver

on:
  pull_request:
    branches: [main]

jobs:
  semver:
    name: Semver Checks
    runs-on: ubuntu-latest
    # informational only — release-plz owns version bumps
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: obi1kenobi/cargo-semver-checks-action@v2
