name: Release

on:
   push:
      branches:
         - main
   workflow_dispatch:

jobs:
   release-plz-release:
      name: Release
      runs-on: ubuntu-latest
      if: ${{ github.repository_owner == 'deadcode-walker' }}
      permissions:
         contents: write
         pull-requests: read
      steps:
         - name: Checkout repository
           uses: actions/checkout@v4
           with:
              fetch-depth: 0
              persist-credentials: false
         - uses: dtolnay/rust-toolchain@stable
         - name: Run release-plz
           uses: release-plz/action@v0.5
           with:
              command: release
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

   release-plz-pr:
      name: Release PR
      runs-on: ubuntu-latest
      # skip when the push is the release PR merge itself — prevents loop
      if: >-
         ${{ github.repository_owner == 'deadcode-walker'
         && !startsWith(github.event.head_commit.message, 'chore: release') }}
      concurrency:
         group: release-plz-${{ github.ref }}
         cancel-in-progress: false
      steps:
         - name: Checkout repository
           uses: actions/checkout@v4
           with:
              fetch-depth: 0
              token: ${{ secrets.RELEASE_PLZ_TOKEN }}
         - uses: dtolnay/rust-toolchain@stable
         - name: Run release-plz
           id: release-plz
           uses: release-plz/action@v0.5
           with:
              command: release-pr
           env:
              GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

         - name: Auto-merge release PR
           if: steps.release-plz.outputs.prs_created == 'true'
           env:
              GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
           run: |
              pr_number="${{ fromJSON(steps.release-plz.outputs.pr).number }}"
              gh pr merge --auto --squash "$pr_number" --repo "$GITHUB_REPOSITORY"
