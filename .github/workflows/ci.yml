name: CI

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]
   merge_group:

env:
   CARGO_TERM_COLOR: always
   RUSTFLAGS: "-Dwarnings"

jobs:
   check:
      name: Check
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
         - uses: dtolnay/rust-toolchain@stable
         - uses: Swatinem/rust-cache@v2
         - run: cargo check --workspace --all-targets --all-features --exclude asterisk-rs-tests

   fmt:
      name: Format
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
         - uses: dtolnay/rust-toolchain@nightly
           with:
              components: rustfmt
         - run: cargo fmt --all -- --check

   clippy:
      name: Clippy
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
         - uses: dtolnay/rust-toolchain@stable
           with:
              components: clippy
         - uses: Swatinem/rust-cache@v2
         - run: cargo clippy --workspace --all-targets --all-features --exclude asterisk-rs-tests -- -D warnings

   test:
      name: "Test (${{ matrix.os }} / ${{ matrix.rust }})"
      runs-on: ${{ matrix.os }}
      strategy:
         fail-fast: false
         matrix:
            os: [ubuntu-latest, macos-latest, windows-latest]
            rust: [stable, "1.83"]
      steps:
         - uses: actions/checkout@v4
         - uses: dtolnay/rust-toolchain@master
           with:
              toolchain: ${{ matrix.rust }}
         - uses: Swatinem/rust-cache@v2
         - run: cargo test --workspace --all-features --exclude asterisk-rs-tests

   test-minimal:
      name: Test (no default features)
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
         - uses: dtolnay/rust-toolchain@stable
         - uses: Swatinem/rust-cache@v2
         - run: cargo test --workspace --no-default-features --exclude asterisk-rs-tests

   mock-tests:
      name: Mock Tests
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
         - uses: dtolnay/rust-toolchain@stable
         - uses: Swatinem/rust-cache@v2
         - run: cargo test -p asterisk-rs-tests
         
   typos:
      name: Typos
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
         - uses: crate-ci/typos@v1
